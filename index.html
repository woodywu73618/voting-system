<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會議投票系統</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --primary: #1a3a5c;
    --accent: #c8973a;
    --danger: #c0392b;
    --success: #27ae60;
    --text: #1c1c1e;
    --text-soft: #6b6b6b;
    --border: #e0ddd6;
    --nav-h: 64px;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── LOGIN ── */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity .4s ease;
  }
  .login-card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 36px;
    width: 340px;
    box-shadow: 0 24px 60px rgba(0,0,0,.25);
    text-align: center;
  }
  .login-card h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--primary);
    margin-bottom: 6px;
  }
  .login-card p { color: var(--text-soft); font-size: .85rem; margin-bottom: 28px; }
  .field { text-align: left; margin-bottom: 16px; }
  .field label { display: block; font-size: .78rem; font-weight: 500; color: var(--text-soft); margin-bottom: 6px; letter-spacing: .04em; }
  .field input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: .95rem; font-family: inherit;
    color: var(--text); background: var(--bg);
    outline: none; transition: border .2s;
  }
  .field input:focus { border-color: var(--primary); }
  .field input[readonly] { background: #f0ede7; color: var(--text-soft); }
  .btn-primary {
    width: 100%; padding: 12px;
    background: var(--primary); color: #fff;
    border: none; border-radius: 10px;
    font-size: 1rem; font-family: inherit; font-weight: 500;
    cursor: pointer; transition: background .2s, transform .1s;
    margin-top: 4px;
  }
  .btn-primary:hover { background: #22507a; }
  .btn-primary:active { transform: scale(.98); }
  #login-error { color: var(--danger); font-size: .82rem; margin-top: 10px; min-height: 18px; }

  /* ── APP SHELL ── */
  #app { display: none; flex-direction: column; flex: 1; }

  /* Top bar */
  .topbar {
    background: var(--primary);
    color: #fff;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; letter-spacing: .02em; }
  .topbar-user { font-size: .8rem; opacity: .8; }
  .btn-logout {
    background: rgba(255,255,255,.15); border: none;
    color: #fff; padding: 5px 12px; border-radius: 20px;
    font-size: .78rem; cursor: pointer; font-family: inherit;
    transition: background .2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,.28); }

  /* Pages */
  .page { display: none; flex: 1; padding: 20px 16px 80px; overflow-y: auto; }
  .page.active { display: block; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex; height: var(--nav-h);
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(0,0,0,.06);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; cursor: pointer;
    color: var(--text-soft); font-size: .7rem; font-weight: 500;
    border: none; background: none; font-family: inherit;
    transition: color .2s;
  }
  .nav-item.active { color: var(--primary); }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item span { font-size: .68rem; }

  /* ── CARDS & COMMON ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 10px rgba(0,0,0,.05);
    border: 1px solid var(--border);
  }
  .section-title {
    font-size: .72rem; font-weight: 700; letter-spacing: .1em;
    color: var(--text-soft); text-transform: uppercase;
    margin-bottom: 12px;
  }
  .badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 20px; font-size: .72rem; font-weight: 600;
  }
  .badge-accent { background: #fdf3e0; color: var(--accent); }
  .badge-success { background: #eafaf1; color: var(--success); }
  .badge-danger { background: #fdedec; color: var(--danger); }

  /* ── VOTE PAGE ── */
  .meeting-header { margin-bottom: 20px; }
  .meeting-header h2 { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .meeting-header .meta { font-size: .82rem; color: var(--text-soft); }

  .vote-option {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px;
    border: 2px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    background: #fff;
    user-select: none;
  }
  .vote-option:hover { border-color: var(--primary); background: #f0f5fb; }
  .vote-option.selected { border-color: var(--primary); background: #eaf0fa; }
  .vote-option.voted-mine { border-color: var(--success); background: #eafaf1; pointer-events: none; }
  .vote-option .radio {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s;
  }
  .vote-option.selected .radio { border-color: var(--primary); }
  .vote-option.selected .radio::after {
    content: ''; width: 10px; height: 10px;
    border-radius: 50%; background: var(--primary);
  }
  .vote-option.voted-mine .radio { border-color: var(--success); }
  .vote-option.voted-mine .radio::after {
    content: ''; width: 10px; height: 10px;
    border-radius: 50%; background: var(--success);
  }
  .vote-option-info { flex: 1; }
  .vote-option-label { font-weight: 600; font-size: .95rem; }
  .vote-option-sub { font-size: .78rem; color: var(--text-soft); margin-top: 2px; }
  .vote-count { font-size: .8rem; color: var(--text-soft); font-weight: 500; }

  .btn-vote {
    width: 100%; padding: 14px;
    background: var(--primary); color: #fff;
    border: none; border-radius: 12px;
    font-size: 1rem; font-family: inherit; font-weight: 600;
    cursor: pointer; margin-top: 8px;
    transition: background .2s, transform .1s;
  }
  .btn-vote:hover { background: #22507a; }
  .btn-vote:disabled { background: #9aacbe; cursor: not-allowed; }

  .closed-banner {
    background: #fdedec; border: 1px solid #f1948a;
    border-radius: 10px; padding: 14px 16px;
    font-size: .88rem; color: var(--danger); text-align: center;
    margin-bottom: 16px; font-weight: 500;
  }
  .voted-banner {
    background: #eafaf1; border: 1px solid #82e0aa;
    border-radius: 10px; padding: 14px 16px;
    font-size: .88rem; color: var(--success); text-align: center;
    margin-bottom: 16px; font-weight: 500;
  }

  /* ── RESULT PAGE ── */
  .stat-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 14px;
  }
  .stat-box {
    background: var(--surface); border-radius: 12px;
    padding: 18px 16px; text-align: center;
    border: 1px solid var(--border);
  }
  .stat-num { font-size: 2rem; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: .74rem; color: var(--text-soft); margin-top: 2px; }

  .result-option { margin-bottom: 12px; }
  .result-option-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .result-option-name { font-weight: 600; font-size: .92rem; }
  .result-count { font-size: .84rem; color: var(--text-soft); }
  .progress-bar { height: 10px; background: #e8e5de; border-radius: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 20px; transition: width .5s ease; }

  .plant-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .plant-cell {
    background: var(--surface); border-radius: 10px;
    border: 1px solid var(--border); padding: 12px 10px;
    text-align: center;
  }
  .plant-name { font-size: .72rem; color: var(--text-soft); margin-bottom: 4px; }
  .plant-count { font-size: 1.3rem; font-weight: 700; color: var(--primary); }

  /* ── LIST PAGE ── */
  .search-input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: inherit; font-size: .9rem; color: var(--text);
    background: var(--surface); outline: none;
    margin-bottom: 14px; transition: border .2s;
  }
  .search-input:focus { border-color: var(--primary); }

  .list-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  .list-table th {
    background: var(--primary); color: #fff;
    padding: 10px 12px; text-align: left; font-weight: 500;
  }
  .list-table th:first-child { border-radius: 8px 0 0 0; }
  .list-table th:last-child { border-radius: 0 8px 0 0; }
  .list-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .list-table tr:last-child td { border-bottom: none; }
  .list-table tr:hover td { background: #f9f7f3; }

  .voted-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--success); margin-right: 4px;
  }

  /* ── SETTINGS PAGE ── */
  .settings-form .field { margin-bottom: 18px; }
  .settings-form label { display: block; font-size: .8rem; font-weight: 600; color: var(--text-soft); margin-bottom: 6px; letter-spacing: .03em; }
  .settings-form input[type=text], .settings-form input[type=datetime-local] {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: .9rem; font-family: inherit; color: var(--text);
    background: var(--bg); outline: none; transition: border .2s;
  }
  .settings-form input:focus { border-color: var(--primary); }

  /* toggle */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .toggle-row:last-of-type { border-bottom: none; }
  .toggle-label { font-weight: 500; font-size: .92rem; }
  .toggle-sub { font-size: .76rem; color: var(--text-soft); margin-top: 2px; }
  .toggle {
    position: relative; width: 48px; height: 28px;
    flex-shrink: 0; cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0; border-radius: 28px;
    background: #d0cdc7; transition: background .25s;
  }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.2);
    transition: left .25s;
  }
  .toggle input:checked ~ .toggle-track { background: var(--primary); }
  .toggle input:checked ~ .toggle-thumb { left: 23px; }

  /* vote options management */
  .option-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--bg);
    border-radius: 10px; margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .option-item-info { flex: 1; }
  .option-item-label { font-weight: 500; font-size: .88rem; }
  .option-item-sub { font-size: .75rem; color: var(--text-soft); }
  .btn-del {
    background: none; border: none; cursor: pointer;
    color: var(--danger); font-size: 1.1rem; padding: 4px;
    opacity: .7; transition: opacity .2s;
  }
  .btn-del:hover { opacity: 1; }

  .add-option-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-option-row input {
    flex: 1; padding: 9px 12px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: .85rem; font-family: inherit; color: var(--text);
    background: var(--surface); outline: none; transition: border .2s;
  }
  .add-option-row input:focus { border-color: var(--primary); }
  .btn-add {
    padding: 9px 16px; background: var(--primary); color: #fff;
    border: none; border-radius: 8px; font-family: inherit;
    font-size: .85rem; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: background .2s;
  }
  .btn-add:hover { background: #22507a; }

  .btn-save {
    width: 100%; padding: 13px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 12px;
    font-size: .95rem; font-family: inherit; font-weight: 600;
    cursor: pointer; margin-top: 4px;
    transition: background .2s;
  }
  .btn-save:hover { background: #b8872e; }

  .admin-only { display: none; }
  body.is-admin .admin-only { display: block; }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1c1c1e; color: #fff; padding: 10px 22px;
    border-radius: 24px; font-size: .85rem; font-weight: 500;
    z-index: 9999; opacity: 0; transition: opacity .25s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .empty-state { text-align: center; padding: 40px 0; color: var(--text-soft); font-size: .9rem; }
  .loading { text-align: center; padding: 30px; color: var(--text-soft); font-size: .85rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>會議投票系統</h1>
    <p>請輸入工號登入</p>
    <div class="field">
      <label>工號</label>
      <input type="text" id="login-id" placeholder="請輸入工號" maxlength="20">
    </div>
    <div class="field">
      <label>姓名</label>
      <input type="text" id="login-name" readonly placeholder="自動帶入">
    </div>
    <button class="btn-primary" onclick="doLogin()">登入</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">會議投票系統</div>
      <div class="topbar-user" id="topbar-user"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">登出</button>
  </div>

  <!-- VOTE PAGE -->
  <div class="page active" id="page-vote">
    <div class="meeting-header card">
      <div id="meeting-status-badge"></div>
      <h2 id="vote-meeting-name">載入中...</h2>
      <div class="meta" id="vote-meeting-time"></div>
    </div>
    <div id="vote-closed-banner" class="closed-banner" style="display:none">投票已截止，無法投票</div>
    <div id="vote-done-banner" class="voted-banner" style="display:none">您已完成投票 ✓</div>
    <div class="card">
      <div class="section-title">請選擇場次</div>
      <div id="vote-options-list"></div>
      <button class="btn-vote" id="btn-submit-vote" onclick="submitVote()" disabled>確認投票</button>
    </div>
  </div>

  <!-- RESULT PAGE -->
  <div class="page" id="page-result">
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-num" id="res-total-voters">0</div>
        <div class="stat-label">已投票人數</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="res-total-list">0</div>
        <div class="stat-label">投票名單人數</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">各場次統計</div>
      <div id="result-options-list"></div>
    </div>

    <div class="card">
      <div class="section-title">各廠別統計</div>
      <div class="plant-grid" id="plant-grid"></div>
    </div>

    <div class="card admin-only">
      <div class="section-title">投票明細</div>
      <div id="result-detail-list"></div>
    </div>
  </div>

  <!-- LIST PAGE -->
  <div class="page" id="page-list">
    <div class="card">
      <div class="section-title">投票名單</div>
      <input class="search-input" type="text" placeholder="搜尋工號或姓名..." oninput="filterList(this.value)">
      <div id="list-count" style="font-size:.78rem;color:var(--text-soft);margin-bottom:10px;"></div>
      <div style="overflow-x:auto;">
        <table class="list-table">
          <thead><tr><th>工號</th><th>姓名</th><th>廠別</th><th>投票狀態</th></tr></thead>
          <tbody id="list-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="card admin-only">
      <div class="section-title">新增名單成員</div>
      <div class="add-option-row">
        <input type="text" id="new-emp-id" placeholder="工號">
        <input type="text" id="new-emp-name" placeholder="姓名">
        <input type="text" id="new-emp-plant" placeholder="廠別">
        <button class="btn-add" onclick="addEmployee()">新增</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS PAGE -->
  <div class="page admin-only" id="page-settings">
    <div class="card">
      <div class="section-title">會議設定</div>
      <div class="settings-form">
        <div class="field">
          <label>會議名稱</label>
          <input type="text" id="set-meeting-name" placeholder="請輸入會議名稱">
        </div>
        <div class="field">
          <label>會議時間</label>
          <input type="datetime-local" id="set-meeting-time">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">截止投票</div>
          <div class="toggle-sub">開啟後，員工無法再投票</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-closed" onchange="updateClosed()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="section-title">投票選項管理</div>
      <div id="settings-options-list"></div>
      <div class="add-option-row">
        <input type="text" id="new-opt-label" placeholder="場次名稱（如：第一場 09:00）">
        <input type="text" id="new-opt-sub" placeholder="說明（選填）">
        <button class="btn-add" onclick="addVoteOption()">新增</button>
      </div>
    </div>

    <div style="padding:0 0 16px">
      <button class="btn-save" onclick="saveSettings()">儲存設定</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchPage('vote',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/>
      </svg>
      <span>投票</span>
    </button>
    <button class="nav-item" onclick="switchPage('result',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 20V10M12 20V4M6 20v-6"/>
      </svg>
      <span>結果</span>
    </button>
    <button class="nav-item" onclick="switchPage('list',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
      </svg>
      <span>名單</span>
    </button>
    <button class="nav-item admin-only" id="nav-settings" onclick="switchPage('settings',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>設定</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyA2ZpeIZDLEpysnECE0WMvYoUkbrZ-SnK8",
  databaseURL: "https://voting-system-6629b-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Admins
const ADMINS = { '1090102': '林琬婷', '1250322': '吳韻姿' };

// State
let currentUser = null; // { id, name, plant, isAdmin }
let allEmployees = {};
let meetingData = {};
let voteOptions = [];
let votesData = {};
let selectedOptionId = null;

// ── LOGIN ──
document.getElementById('login-id').addEventListener('input', function() {
  const id = this.value.trim();
  if (ADMINS[id]) {
    document.getElementById('login-name').value = ADMINS[id];
  } else {
    const emp = allEmployees[id];
    document.getElementById('login-name').value = emp ? emp.name : '';
  }
});

document.getElementById('login-id').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!id) { errEl.textContent = '請輸入工號'; return; }

  // Fetch latest employees
  const snap = await db.ref('employees').get();
  if (snap.exists()) allEmployees = snap.val();

  let name, plant, isAdmin = false;
  if (ADMINS[id]) {
    name = ADMINS[id]; plant = '管理員'; isAdmin = true;
  } else if (allEmployees[id]) {
    name = allEmployees[id].name; plant = allEmployees[id].plant || '';
  } else {
    errEl.textContent = '工號不存在，請確認後重試';
    return;
  }

  currentUser = { id, name, plant, isAdmin };
  document.getElementById('topbar-user').textContent = `${name}（${id}）`;
  if (isAdmin) document.body.classList.add('is-admin');

  document.getElementById('login-screen').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  }, 350);

  startListeners();
}

function doLogout() {
  currentUser = null;
  document.body.classList.remove('is-admin');
  document.getElementById('login-id').value = '';
  document.getElementById('login-name').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-screen').style.opacity = '1';
  document.getElementById('app').style.display = 'none';
  stopListeners();
}

// ── LISTENERS ──
let unsubMeeting, unsubVotes, unsubEmployees, unsubOptions;

function startListeners() {
  unsubMeeting = db.ref('meeting').on('value', snap => {
    meetingData = snap.val() || {};
    renderVotePage();
    renderResultPage();
    if (currentUser?.isAdmin) renderSettingsPage();
  });
  unsubOptions = db.ref('voteOptions').on('value', snap => {
    const raw = snap.val() || {};
    voteOptions = Object.entries(raw).map(([id,v]) => ({id,...v}));
    renderVotePage();
    renderResultPage();
    if (currentUser?.isAdmin) renderSettingsPage();
  });
  unsubVotes = db.ref('votes').on('value', snap => {
    votesData = snap.val() || {};
    renderVotePage();
    renderResultPage();
    renderListPage();
  });
  unsubEmployees = db.ref('employees').on('value', snap => {
    allEmployees = snap.val() || {};
    renderListPage();
    renderResultPage();
  });
}

function stopListeners() {
  if (unsubMeeting) db.ref('meeting').off('value', unsubMeeting);
  if (unsubOptions) db.ref('voteOptions').off('value', unsubOptions);
  if (unsubVotes) db.ref('votes').off('value', unsubVotes);
  if (unsubEmployees) db.ref('employees').off('value', unsubEmployees);
}

// ── NAV ──
function switchPage(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
}

// ── VOTE PAGE ──
function renderVotePage() {
  if (!currentUser) return;
  const name = meetingData.name || '（未設定會議名稱）';
  const time = meetingData.time ? new Date(meetingData.time).toLocaleString('zh-TW') : '（未設定）';
  const closed = meetingData.closed || false;

  document.getElementById('vote-meeting-name').textContent = name;
  document.getElementById('vote-meeting-time').textContent = '🗓 ' + time;

  const badge = document.getElementById('meeting-status-badge');
  badge.innerHTML = closed
    ? '<span class="badge badge-danger" style="margin-bottom:8px;display:inline-block">投票已截止</span>'
    : '<span class="badge badge-success" style="margin-bottom:8px;display:inline-block">投票進行中</span>';

  const myVote = votesData[currentUser.id];
  const closedBanner = document.getElementById('vote-closed-banner');
  const doneBanner = document.getElementById('vote-done-banner');
  const btnSubmit = document.getElementById('btn-submit-vote');

  closedBanner.style.display = (closed && !myVote) ? '' : 'none';
  doneBanner.style.display = myVote ? '' : 'none';
  if (myVote) doneBanner.textContent = `您已投票：${myVote.optionLabel || myVote.optionId} ✓`;

  const list = document.getElementById('vote-options-list');
  if (!voteOptions.length) {
    list.innerHTML = '<div class="empty-state">尚未設定投票選項</div>';
    btnSubmit.disabled = true;
    return;
  }

  list.innerHTML = voteOptions.map(opt => {
    const count = Object.values(votesData).filter(v => v.optionId === opt.id).length;
    const isMine = myVote && myVote.optionId === opt.id;
    const isSelected = selectedOptionId === opt.id && !myVote;
    return `<div class="vote-option ${isMine?'voted-mine':''} ${isSelected?'selected':''}"
      onclick="${(!myVote && !closed) ? `selectOption('${opt.id}')` : ''}">
      <div class="radio"></div>
      <div class="vote-option-info">
        <div class="vote-option-label">${opt.label}</div>
        ${opt.sub ? `<div class="vote-option-sub">${opt.sub}</div>` : ''}
      </div>
      ${currentUser.isAdmin ? `<div class="vote-count">${count} 票</div>` : ''}
    </div>`;
  }).join('');

  btnSubmit.disabled = !selectedOptionId || !!myVote || closed;
  btnSubmit.textContent = myVote ? '已完成投票' : '確認投票';
}

function selectOption(id) {
  selectedOptionId = id;
  renderVotePage();
}

async function submitVote() {
  if (!selectedOptionId || !currentUser) return;
  const opt = voteOptions.find(o => o.id === selectedOptionId);
  if (!opt) return;
  const confirmMsg = `確認投票「${opt.label}」？\n投票後無法更改。`;
  if (!confirm(confirmMsg)) return;
  await db.ref('votes/' + currentUser.id).set({
    optionId: opt.id,
    optionLabel: opt.label,
    name: currentUser.name,
    plant: currentUser.plant,
    time: new Date().toISOString()
  });
  showToast('投票成功！');
}

// ── RESULT PAGE ──
function renderResultPage() {
  const totalVoters = Object.keys(votesData).length;
  const totalList = Object.keys(allEmployees).length;
  document.getElementById('res-total-voters').textContent = totalVoters;
  document.getElementById('res-total-list').textContent = totalList;

  // Per option
  const optList = document.getElementById('result-options-list');
  if (!voteOptions.length) {
    optList.innerHTML = '<div class="empty-state">尚未設定投票選項</div>';
  } else {
    optList.innerHTML = voteOptions.map(opt => {
      const count = Object.values(votesData).filter(v => v.optionId === opt.id).length;
      const pct = totalVoters ? Math.round(count/totalVoters*100) : 0;
      return `<div class="result-option">
        <div class="result-option-header">
          <span class="result-option-name">${opt.label}</span>
          <span class="result-count">${count} 票 (${pct}%)</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  }

  // Per plant
  const plantMap = {};
  Object.values(votesData).forEach(v => {
    const p = v.plant || '未知';
    plantMap[p] = (plantMap[p]||0) + 1;
  });
  // Also show plants with 0
  Object.values(allEmployees).forEach(e => {
    const p = e.plant || '未知';
    if (!(p in plantMap)) plantMap[p] = 0;
  });
  const grid = document.getElementById('plant-grid');
  const sorted = Object.entries(plantMap).sort((a,b) => b[1]-a[1]);
  grid.innerHTML = sorted.length ? sorted.map(([p,c]) =>
    `<div class="plant-cell"><div class="plant-name">${p}</div><div class="plant-count">${c}</div></div>`
  ).join('') : '<div class="empty-state" style="grid-column:1/-1">暫無資料</div>';

  // Detail (admin)
  const detail = document.getElementById('result-detail-list');
  if (detail) {
    const rows = Object.entries(votesData).map(([empId, v]) =>
      `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.83rem">
        <span>${v.name}（${empId}）${v.plant?`<span style="color:var(--text-soft);margin-left:4px">${v.plant}</span>`:''}</span>
        <span style="color:var(--primary);font-weight:500">${v.optionLabel||v.optionId}</span>
      </div>`
    ).join('');
    detail.innerHTML = rows || '<div class="empty-state">尚無投票記錄</div>';
  }
}

// ── LIST PAGE ──
let listFilter = '';
function filterList(val) {
  listFilter = val;
  renderListPage();
}

function renderListPage() {
  const allEmp = Object.entries(allEmployees);
  const filtered = allEmp.filter(([id, e]) =>
    id.includes(listFilter) || (e.name||'').includes(listFilter) || (e.plant||'').includes(listFilter)
  );
  document.getElementById('list-count').textContent = `共 ${allEmp.length} 人，顯示 ${filtered.length} 人`;
  const tbody = document.getElementById('list-tbody');
  tbody.innerHTML = filtered.map(([id, e]) => {
    const voted = votesData[id];
    return `<tr>
      <td>${id}</td>
      <td>${e.name||''}</td>
      <td>${e.plant||''}</td>
      <td>${voted
        ? `<span class="voted-dot"></span><span style="color:var(--success);font-size:.8rem">${voted.optionLabel||voted.optionId}</span>`
        : `<span style="color:var(--text-soft);font-size:.8rem">未投票</span>`}</td>
    </tr>`;
  }).join('');
}

async function addEmployee() {
  const id = document.getElementById('new-emp-id').value.trim();
  const name = document.getElementById('new-emp-name').value.trim();
  const plant = document.getElementById('new-emp-plant').value.trim();
  if (!id || !name) { showToast('請填寫工號與姓名'); return; }
  await db.ref('employees/'+id).set({ name, plant });
  document.getElementById('new-emp-id').value = '';
  document.getElementById('new-emp-name').value = '';
  document.getElementById('new-emp-plant').value = '';
  showToast('已新增成員');
}

// ── SETTINGS PAGE ──
function renderSettingsPage() {
  document.getElementById('set-meeting-name').value = meetingData.name || '';
  if (meetingData.time) {
    // Convert ISO to datetime-local
    const d = new Date(meetingData.time);
    const local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
    document.getElementById('set-meeting-time').value = local;
  }
  document.getElementById('toggle-closed').checked = meetingData.closed || false;

  const optList = document.getElementById('settings-options-list');
  optList.innerHTML = voteOptions.map(opt =>
    `<div class="option-item">
      <div class="option-item-info">
        <div class="option-item-label">${opt.label}</div>
        ${opt.sub ? `<div class="option-item-sub">${opt.sub}</div>` : ''}
      </div>
      <button class="btn-del" onclick="deleteOption('${opt.id}')">✕</button>
    </div>`
  ).join('') || '<div class="empty-state" style="padding:16px 0">尚無選項</div>';
}

async function saveSettings() {
  const name = document.getElementById('set-meeting-name').value.trim();
  const timeVal = document.getElementById('set-meeting-time').value;
  const timeISO = timeVal ? new Date(timeVal).toISOString() : '';
  await db.ref('meeting').update({ name, time: timeISO });
  showToast('設定已儲存');
}

async function updateClosed() {
  const closed = document.getElementById('toggle-closed').checked;
  await db.ref('meeting').update({ closed });
  showToast(closed ? '投票已截止' : '投票已開放');
}

async function addVoteOption() {
  const label = document.getElementById('new-opt-label').value.trim();
  const sub = document.getElementById('new-opt-sub').value.trim();
  if (!label) { showToast('請輸入場次名稱'); return; }
  await db.ref('voteOptions').push({ label, sub });
  document.getElementById('new-opt-label').value = '';
  document.getElementById('new-opt-sub').value = '';
  showToast('已新增選項');
}

async function deleteOption(id) {
  if (!confirm('確認刪除此選項？')) return;
  await db.ref('voteOptions/'+id).remove();
  showToast('已刪除選項');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init: pre-load employees
db.ref('employees').get().then(snap => {
  if (snap.exists()) allEmployees = snap.val();
});
</script>
